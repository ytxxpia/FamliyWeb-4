name: Issue自动处理

on:
  issues:
    types:
      - opened
      - labeled
      - edited

permissions:
  contents: write
  issues: write

jobs:
  process:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'blog') || contains(github.event.issue.labels.*.name, 'Notice') || contains(github.event.issue.labels.*.name, 'bug')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 处理Issue
        run: |
          mkdir -p blog interactive
          
          echo "处理 Issue #${{ github.event.issue.number }}"
          echo "标题: ${{ github.event.issue.title }}"
          echo "标签: ${{ join(github.event.issue.labels.*.name, ', ') }}"
          
          # 处理 blog 标签
          if echo "${{ join(github.event.issue.labels.*.name, ',') }}" | grep -q "blog"; then
            echo "生成博客文章..."
            cat > "blog/${{ github.event.issue.title }}.md" << 'EOF'
          # ${{ github.event.issue.title }}
          
          > 作者: @${{ github.event.issue.user.login }}
          
          ${{ github.event.issue.body }}
          EOF
            echo '{"issue": "${{ github.event.issue.number }}", "title": "${{ github.event.issue.title }}"}' > interactive/New\ blog.json
          fi
          
          # 处理 Notice 标签
          if echo "${{ join(github.event.issue.labels.*.name, ',') }}" | grep -q "Notice"; then
            echo "生成通知..."
            echo '{"issue": "${{ github.event.issue.number }}", "title": "${{ github.event.issue.title }}", "content": "${{ github.event.issue.body }}"}' > interactive/New\ notice.json
          fi
          
          # 处理 bug 标签
          if echo "${{ join(github.event.issue.labels.*.name, ',') }}" | grep -q "bug"; then
            echo "生成Bug报告..."
            echo '{"issue": "${{ github.event.issue.number }}", "title": "${{ github.event.issue.title }}", "description": "${{ github.event.issue.body }}", "status": "pending"}' > interactive/New\ bug.json
          fi
      
      - name: 提交更改
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions Bot"
          git add blog/ interactive/
          git diff --staged --quiet || git commit -m "处理 Issue #${{ github.event.issue.number }}"
          git diff --staged --quiet || git push
      
      - name: 添加评论
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.issue.number;
            const labels = "${{ join(github.event.issue.labels.*.name, ',') }}";
            let msg = "处理完成！\n";
            if (labels.includes('blog')) msg += "- blog文章已生成\n";
            if (labels.includes('Notice')) msg += "- Notice已记录\n";
            if (labels.includes('bug')) msg += "- bug已记录\n";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: msg
            });
