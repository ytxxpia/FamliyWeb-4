name: Issue自动处理

on:
  issues:
    types:
      - opened
      - labeled
      - edited

permissions:
  contents: write
  issues: write

jobs:
  process:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'blog') || contains(github.event.issue.labels.*.name, 'Notice') || contains(github.event.issue.labels.*.name, 'bug')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 创建文件夹
        run: |
          mkdir -p blog interactive
      
      - name: 处理 blog 标签
        if: contains(github.event.issue.labels.*.name, 'blog')
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          ISSUE_AUTHOR="${{ github.event.issue.user.login }}"
          
          # 提取元数据（writer-xxx, date-xxx）
          AUTHOR="$ISSUE_AUTHOR"
          DATE=$(date +%Y-%m-%d)
          
          # 从正文第一行提取 writer 和 date
          FIRST_LINE=$(echo "$ISSUE_BODY" | head -1)
          if echo "$FIRST_LINE" | grep -q "writer-"; then
            AUTHOR=$(echo "$FIRST_LINE" | grep -o "writer-[^,，\s]*" | cut -d'-' -f2)
          fi
          if echo "$FIRST_LINE" | grep -q "date-"; then
            DATE_RAW=$(echo "$FIRST_LINE" | grep -o "date-[^,，\s]*" | cut -d'-' -f2)
            if [ -n "$DATE_RAW" ]; then
              DATE=$(echo "$DATE_RAW" | sed 's/\./-/g')
            fi
          fi
          
          # 去掉正文第一行的元数据
          BODY_WITHOUT_META=$(echo "$ISSUE_BODY" | tail -n +2 | sed '/^-\s*$/d')
          if [ -z "$BODY_WITHOUT_META" ]; then
            BODY_WITHOUT_META="$ISSUE_BODY"
          fi
          
          # 生成文件名
          FILENAME=$(echo "$ISSUE_TITLE" | sed 's/[^a-zA-Z0-9\u4e00-\u9fa5]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//')
          if [ -z "$FILENAME" ]; then
            FILENAME="issue-$ISSUE_NUMBER"
          fi
          
          # 生成 Markdown 文件
          cat > "blog/${FILENAME}.md" << BLOG_EOF
          writer-${AUTHOR},name-${ISSUE_TITLE},date-${DATE}
          -
          # ${ISSUE_TITLE}
          
          > 本文由 @${ISSUE_AUTHOR} 通过 Issue #${ISSUE_NUMBER} 投稿
          
          ${BODY_WITHOUT_META}
          
          ---
          本文自动生成于 $(date '+%Y-%m-%d %H:%M:%S')
          BLOG_EOF
          
          echo "✅ 已生成: blog/${FILENAME}.md"
          
          # 追加到 New blog.json（双轨制日志）
          LOG_ENTRY="{\"issue_number\":\"${ISSUE_NUMBER}\",\"title\":\"${ISSUE_TITLE}\",\"author\":\"${AUTHOR}\",\"date\":\"${DATE}\",\"filename\":\"${FILENAME}.md\",\"original_author\":\"${ISSUE_AUTHOR}\",\"processed_at\":\"$(date -Iseconds)\"}"
          
          if [ -f "interactive/New blog.json" ]; then
            # 如果文件存在，去掉末尾的 ]，追加新条目
            sed -i '$ d' interactive/New\ blog.json
            echo "," >> interactive/New\ blog.json
            echo "$LOG_ENTRY" >> interactive/New\ blog.json
            echo "]" >> interactive/New\ blog.json
          else
            # 如果文件不存在，创建新数组
            echo "[" > interactive/New\ blog.json
            echo "$LOG_ENTRY" >> interactive/New\ blog.json
            echo "]" >> interactive/New\ blog.json
          fi
          
          echo "✅ 已记录: interactive/New blog.json"
      
      - name: 处理 Notice 标签
        if: contains(github.event.issue.labels.*.name, 'Notice')
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          ISSUE_AUTHOR="${{ github.event.issue.user.login }}"
          REPO="${{ github.repository }}"
          
          LOG_ENTRY="{\"issue_number\":\"${ISSUE_NUMBER}\",\"title\":\"${ISSUE_TITLE}\",\"author\":\"${ISSUE_AUTHOR}\",\"content\":\"$(echo "$ISSUE_BODY" | tr '\n' ' ' | sed 's/"/\\"/g')\",\"created_at\":\"$(date -Iseconds)\",\"url\":\"https://github.com/${REPO}/issues/${ISSUE_NUMBER}\"}"
          
          if [ -f "interactive/New notice.json" ]; then
            sed -i '$ d' interactive/New\ notice.json
            echo "," >> interactive/New\ notice.json
            echo "$LOG_ENTRY" >> interactive/New\ notice.json
            echo "]" >> interactive/New\ notice.json
          else
            echo "[" > interactive/New\ notice.json
            echo "$LOG_ENTRY" >> interactive/New\ notice.json
            echo "]" >> interactive/New\ notice.json
          fi
          
          echo "✅ 已记录: interactive/New notice.json"
      
      - name: 处理 bug 标签
        if: contains(github.event.issue.labels.*.name, 'bug')
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          ISSUE_AUTHOR="${{ github.event.issue.user.login }}"
          REPO="${{ github.repository }}"
          
          LOG_ENTRY="{\"issue_number\":\"${ISSUE_NUMBER}\",\"title\":\"${ISSUE_TITLE}\",\"author\":\"${ISSUE_AUTHOR}\",\"description\":\"$(echo "$ISSUE_BODY" | tr '\n' ' ' | sed 's/"/\\"/g')\",\"created_at\":\"$(date -Iseconds)\",\"url\":\"https://github.com/${REPO}/issues/${ISSUE_NUMBER}\",\"status\":\"pending\"}"
          
          if [ -f "interactive/New bug.json" ]; then
            sed -i '$ d' interactive/New\ bug.json
            echo "," >> interactive/New\ bug.json
            echo "$LOG_ENTRY" >> interactive/New\ bug.json
            echo "]" >> interactive/New\ bug.json
          else
            echo "[" > interactive/New\ bug.json
            echo "$LOG_ENTRY" >> interactive/New\ bug.json
            echo "]" >> interactive/New\ bug.json
          fi
          
          echo "✅ 已记录: interactive/New bug.json"
      
      - name: 提交更改
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions Bot"
          git add blog/ interactive/
          if ! git diff --staged --quiet; then
            git commit -m "处理 Issue #${{ github.event.issue.number }} [skip ci]"
            git push
          else
            echo "无变化需要提交"
          fi
      
      - name: 添加评论
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.issue.number;
            const labels = "${{ join(github.event.issue.labels.*.name, ',') }}";
            let msg = "✅ 处理完成！\n\n";
            if (labels.includes('blog')) {
              msg += "📝 **博客文章**：已生成到 `blog/` 文件夹\n";
              msg += "📋 **日志记录**：已追加到 `interactive/New blog.json`\n";
            }
            if (labels.includes('Notice')) {
              msg += "📢 **通知**：已记录到 `interactive/New notice.json`\n";
            }
            if (labels.includes('bug')) {
              msg += "🐛 **Bug报告**：已记录到 `interactive/New bug.json`\n";
            }
            msg += "\n感谢贡献！🎉";
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: msg
            });
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['processed']
            });
