name: 博客自动化

on:
  push:
    branches: [ main ]
    paths:
      - 'blog/**'
  issues:
    types: [opened, labeled, edited]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  blog-automation:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5
      
      - name: 创建文件夹
        run: |
          mkdir -p blog interactive
      
      - name: 从Issue生成文章
        if: github.event_name == 'issues' && (contains(github.event.issue.labels.*.name, 'blog') || contains(github.event.issue.labels.*.name, 'Notice') || contains(github.event.issue.labels.*.name, 'bug'))
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_AUTHOR="${{ github.event.issue.user.login }}"
          LABELS="${{ join(github.event.issue.labels.*.name, ',') }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          REPO="${{ github.repository }}"
          
          echo "处理 Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}"
          echo "标签: ${LABELS}"
          
          # 处理 blog 标签
          if echo "${LABELS}" | grep -q "blog"; then
            echo "生成博客文章..."
            
            AUTHOR="${ISSUE_AUTHOR}"
            DATE=$(date +%Y-%m-%d)
            
            FIRST_LINE=$(echo "${ISSUE_BODY}" | head -1)
            if echo "${FIRST_LINE}" | grep -q "writer-"; then
              AUTHOR=$(echo "${FIRST_LINE}" | grep -o "writer-[^,，\s]*" | cut -d'-' -f2)
            fi
            if echo "${FIRST_LINE}" | grep -q "date-"; then
              DATE_RAW=$(echo "${FIRST_LINE}" | grep -o "date-[^,，\s]*" | cut -d'-' -f2)
              if [ -n "${DATE_RAW}" ]; then
                DATE=$(echo "${DATE_RAW}" | sed 's/\./-/g')
              fi
            fi
            
            BODY_WITHOUT_META=$(echo "${ISSUE_BODY}" | tail -n +2 | sed '/^-\s*$/d')
            if [ -z "${BODY_WITHOUT_META}" ]; then
              BODY_WITHOUT_META="${ISSUE_BODY}"
            fi
            
            FILENAME=$(echo "${ISSUE_TITLE}" | sed 's/[^a-zA-Z0-9\u4e00-\u9fa5]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//')
            if [ -z "${FILENAME}" ]; then
              FILENAME="issue-${ISSUE_NUMBER}"
            fi
            
            cat > "blog/${FILENAME}.md" << BLOG_EOF
          writer-${AUTHOR},name-${ISSUE_TITLE},date-${DATE}
          -
          # ${ISSUE_TITLE}
          
          > 本文由 @${ISSUE_AUTHOR} 通过 Issue #${ISSUE_NUMBER} 投稿
          
          ${BODY_WITHOUT_META}
          
          ---
          本文自动生成于 $(date '+%Y-%m-%d %H:%M:%S')
          BLOG_EOF
            
            echo "已生成: blog/${FILENAME}.md"
            
            LOG_ENTRY="{\"issue_number\":\"${ISSUE_NUMBER}\",\"title\":\"${ISSUE_TITLE}\",\"author\":\"${AUTHOR}\",\"date\":\"${DATE}\",\"filename\":\"${FILENAME}.md\",\"original_author\":\"${ISSUE_AUTHOR}\",\"processed_at\":\"$(date -Iseconds)\"}"
            
            if [ -f "interactive/New blog.json" ]; then
              sed -i '$ d' interactive/New\ blog.json
              echo "," >> interactive/New\ blog.json
              echo "${LOG_ENTRY}" >> interactive/New\ blog.json
              echo "]" >> interactive/New\ blog.json
            else
              echo "[" > interactive/New\ blog.json
              echo "${LOG_ENTRY}" >> interactive/New\ blog.json
              echo "]" >> interactive/New\ blog.json
            fi
            echo "已记录: interactive/New blog.json"
          fi
          
          # 处理 Notice 标签
          if echo "${LABELS}" | grep -q "Notice"; then
            echo "生成通知..."
            LOG_ENTRY="{\"issue_number\":\"${ISSUE_NUMBER}\",\"title\":\"${ISSUE_TITLE}\",\"author\":\"${ISSUE_AUTHOR}\",\"content\":\"$(echo "${ISSUE_BODY}" | head -c 500 | tr '\n' ' ' | sed 's/"/\\"/g')\",\"created_at\":\"$(date -Iseconds)\",\"url\":\"https://github.com/${REPO}/issues/${ISSUE_NUMBER}\"}"
            
            if [ -f "interactive/New notice.json" ]; then
              sed -i '$ d' interactive/New\ notice.json
              echo "," >> interactive/New\ notice.json
              echo "${LOG_ENTRY}" >> interactive/New\ notice.json
              echo "]" >> interactive/New\ notice.json
            else
              echo "[" > interactive/New\ notice.json
              echo "${LOG_ENTRY}" >> interactive/New\ notice.json
              echo "]" >> interactive/New\ notice.json
            fi
            echo "已记录: interactive/New notice.json"
          fi
          
          # 处理 bug 标签
          if echo "${LABELS}" | grep -q "bug"; then
            echo "生成Bug报告..."
            LOG_ENTRY="{\"issue_number\":\"${ISSUE_NUMBER}\",\"title\":\"${ISSUE_TITLE}\",\"author\":\"${ISSUE_AUTHOR}\",\"description\":\"$(echo "${ISSUE_BODY}" | head -c 500 | tr '\n' ' ' | sed 's/"/\\"/g')\",\"created_at\":\"$(date -Iseconds)\",\"url\":\"https://github.com/${REPO}/issues/${ISSUE_NUMBER}\",\"status\":\"pending\"}"
            
            if [ -f "interactive/New bug.json" ]; then
              sed -i '$ d' interactive/New\ bug.json
              echo "," >> interactive/New\ bug.json
              echo "${LOG_ENTRY}" >> interactive/New\ bug.json
              echo "]" >> interactive/New\ bug.json
            else
              echo "[" > interactive/New\ bug.json
              echo "${LOG_ENTRY}" >> interactive/New\ bug.json
              echo "]" >> interactive/New\ bug.json
            fi
            echo "已记录: interactive/New bug.json"
          fi
          
          # 添加成功评论
          echo "COMMENT<<EOF" >> $GITHUB_ENV
          echo "处理完成！" >> $GITHUB_ENV
          if echo "${LABELS}" | grep -q "blog"; then
            echo "- 博客文章已生成" >> $GITHUB_ENV
          fi
          if echo "${LABELS}" | grep -q "Notice"; then
            echo "- 通知已记录" >> $GITHUB_ENV
          fi
          if echo "${LABELS}" | grep -q "bug"; then
            echo "- Bug报告已记录" >> $GITHUB_ENV
          fi
          echo "EOF" >> $GITHUB_ENV
      
      - name: 生成list.json
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || success()
        run: |
          echo "生成博客列表..."
          
          cd blog
          echo "[" > list.json
          first=true
          for f in *.md; do
            if [ -f "$f" ] && [ "$f" != "list.json" ]; then
              # 尝试从文件中提取标题
              title=$(echo "$f" | sed 's/\.md$//')
              author="?"
              date_str="1900-01-01"
              
              # 读取文件第一行获取元数据
              if [ -f "$f" ]; then
                first_line=$(head -1 "$f" 2>/dev/null)
                if echo "$first_line" | grep -q "writer-"; then
                  author=$(echo "$first_line" | grep -o "writer-[^,，\s]*" | cut -d'-' -f2)
                fi
                if echo "$first_line" | grep -q "name-"; then
                  title=$(echo "$first_line" | grep -o "name-[^,，\s]*" | cut -d'-' -f2)
                fi
                if echo "$first_line" | grep -q "date-"; then
                  date_meta=$(echo "$first_line" | grep -o "date-[^,，\s]*" | cut -d'-' -f2)
                  if [ -n "$date_meta" ]; then
                    date_str=$(echo "$date_meta" | sed 's/\./-/g')
                  fi
                fi
              fi
              
              if [ "$first" = true ]; then
                first=false
              else
                echo "," >> list.json
              fi
              echo "{\"title\":\"$title\",\"file\":\"$f\",\"author\":\"$author\",\"date\":\"$date_str\"}" >> list.json
            fi
          done
          echo "]" >> list.json
          cd ..
          
          echo "已生成 blog/list.json"
      
      - name: 提交所有更改
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions Bot"
          git add blog/ interactive/
          if ! git diff --staged --quiet; then
            git commit -m "博客自动化更新 [skip ci]"
            git push
          else
            echo "无变化需要提交"
          fi
      
      - name: Issue评论
        if: github.event_name == 'issues' && success()
        uses: actions/github-script@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.issue.number;
            const labels = "${{ join(github.event.issue.labels.*.name, ',') }}";
            let msg = "处理完成！\n\n";
            if (labels.includes('blog')) msg += "- 博客文章已生成到 `blog/` 文件夹\n";
            if (labels.includes('Notice')) msg += "- 通知已记录到 `interactive/New notice.json`\n";
            if (labels.includes('bug')) msg += "- Bug报告已记录到 `interactive/New bug.json`\n";
            msg += "\n博客列表已同步更新。";
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: msg
            });
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['processed']
            });
